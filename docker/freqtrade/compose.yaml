name: helix-freqtrade

services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: helix-freqtrade
    restart: unless-stopped
    volumes:
      - ${HOME}/.freqtrade/user_data:/freqtrade/user_data
      - ../../skills/helix-freqtrade/assets:/freqtrade/strategies:ro
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      FREQTRADE__API_SERVER__ENABLED: "true"
      FREQTRADE__API_SERVER__LISTEN_IP_ADDRESS: "0.0.0.0"
      FREQTRADE__API_SERVER__LISTEN_PORT: "8080"
      FREQTRADE__API_SERVER__USERNAME: ${FREQTRADE_USERNAME:-freqtrade}
      FREQTRADE__API_SERVER__PASSWORD: ${FREQTRADE_PASSWORD:?FREQTRADE_PASSWORD is required}
      FREQTRADE__API_SERVER__JWT_SECRET_KEY: ${FREQTRADE_JWT_SECRET:?FREQTRADE_JWT_SECRET is required}
      FREQTRADE__EXCHANGE__KEY: ${OKX_API_KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${OKX_API_SECRET:-}
      FREQTRADE__EXCHANGE__PASSWORD: ${OKX_PASSWORD:-}
      HELIX_SIGNAL_ARTIFACT_PATH: ${HELIX_SIGNAL_ARTIFACT_PATH:-}
      HELIX_SIGNAL_TIMEFRAME: ${HELIX_SIGNAL_TIMEFRAME:-}
    command:
      - trade
      - --logfile
      - /freqtrade/user_data/logs/freqtrade.log
      - --db-url
      - sqlite:////freqtrade/user_data/tradesv3.sqlite
      - --config
      - /freqtrade/user_data/config.json
      - --userdir
      - /freqtrade/user_data
      - --strategy-path
      - /freqtrade/strategies
